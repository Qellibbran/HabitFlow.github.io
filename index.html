<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>HabitFlow — Мой Проект</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">HabitFlow</div>
    </header>

    <div class="wrapper">
      <aside class="sidebar">
        <nav>
          <a href="index.html">Главная</a>
          <a href="about.html">О проекте</a>
          <a href="help.html">Помощь</a>
        </nav>
      </aside>

      <main class="content">
        <div class="card">
          <h2>Мои Привычки</h2>

          <div class="progress">
            <p>Прогресс: <span id="percentText">0%</span></p>
            <div class="bar-out"><div id="bar-in"></div></div>
          </div>

          <div class="input-box">
            <input type="text" id="habitInput" placeholder="Новая задача..." />
            <button id="addBtn">Ок</button>
          </div>

          <div id="empty">
            <img src="gif/gussa.gif" width="150" />
            <p>Скала наблюдает за тобой!😱</p>
          </div>

          <ul id="habitList"></ul>
        </div>
      </main>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Мой учебный проект</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
